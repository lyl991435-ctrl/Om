<!DOCTYPE html>
<html>
<head>
    <title>Pong Game</title>
    <style>
        canvas {
            background: #eee;
            display: block;
            margin: 0 auto;
        }
    </style>
    <script>
        const canvas = document.getElementById('pong');
        const context = canvas.getContext('2d');

        const paddleWidth = 10;
        const paddleHeight = 100;
        const ballSize = 10;
        let ballSpeedX = 5;
        let ballSpeedY = 5;
        const maxBallSpeed = 10; // Cap ball speed

        let leftPaddleY = 50;
        let rightPaddleY = 50;
        let paddleSpeed = 0;

        function draw() {
            // Clear canvas
            context.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw paddles
            context.fillStyle = 'black';
            context.fillRect(0, leftPaddleY, paddleWidth, paddleHeight);
            context.fillRect(canvas.width - paddleWidth, rightPaddleY, paddleWidth, paddleHeight);

            // Draw ball
            context.fillRect(ballX, ballY, ballSize, ballSize);
        }

        function update() {
            // Ball movement and collision
            ballX += ballSpeedX;
            ballY += ballSpeedY;

            // Velocity magnitude check
            const velocityMagnitude = Math.sqrt(ballSpeedX * ballSpeedX + ballSpeedY * ballSpeedY);
            if (velocityMagnitude > maxBallSpeed) {
                const scale = maxBallSpeed / velocityMagnitude;
                ballSpeedX *= scale;
                ballSpeedY *= scale;
            }

            // Paddle collision detection
            if (ballX < paddleWidth && ballY > leftPaddleY && ballY < leftPaddleY + paddleHeight) {
                ballSpeedX = -ballSpeedX;
            } else if (ballX > canvas.width - paddleWidth - ballSize && ballY > rightPaddleY && ballY < rightPaddleY + paddleHeight) {
                ballSpeedX = -ballSpeedX;
            }

            // Ball reset
            if (ballX < 0 || ballX > canvas.width) {
                ballX = canvas.width / 2;
                ballY = canvas.height / 2;
                ballSpeedX = 5; // Reset speed
                ballSpeedY = 5;
            }
        }

        function mouseMove(event) {
            const mouseY = event.clientY - canvas.getBoundingClientRect().top;
            leftPaddleY = mouseY - paddleHeight / 2;
        }

        function keyDown(event) {
            if (event.key === 'ArrowUp') {
                paddleSpeed = -5;
            } else if (event.key === 'ArrowDown') {
                paddleSpeed = 5;
            }
        }

        function keyUp(event) {
            if (event.key === 'ArrowUp' || event.key === 'ArrowDown') {
                paddleSpeed = 0;
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        window.onload = function() {
            canvas.width = 800;
            canvas.height = 400;
            document.addEventListener('mousemove', mouseMove);
            document.addEventListener('keydown', keyDown);
            document.addEventListener('keyup', keyUp);
            gameLoop();
        };
    </script>
</head>
<body>
    <canvas id='pong'></canvas>
</body>
</html>
