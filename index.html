 <!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>لعبة التخمين بمحاولة واحدة</title>
    <link rel="stylesheet" href="style.css">
</head>
<body dir="rtl">
    <div class="game-container">
        <h1>لعبة التخمين 🎯</h1>
        <p>اختر رقمًا من 1 إلى 10. لديك محاولة واحدة فقط!</p>

        <input type="number" id="guessInput" min="1" max="10" placeholder="أدخل رقمًا">
        <button id="guessButton">تخمين</button>

        <p id="result"></p>
        <button id="retryButton" style="display:none;">لعبة جديدة</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
